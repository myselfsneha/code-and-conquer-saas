<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
    <div></div>
</div>

<div class="sidebar">
<h2>🎓 Code & Conquer</h2>
<a href="dashboard.html" class="active">📊 Dashboard</a>
<a href="students.html">👨‍🎓 Students</a>

<label class="switch mt-3">
<input type="checkbox" onclick="toggleDark()">
<span class="slider"></span>
</label>
<p>Dark Mode</p>
</div>

<div class="main">

<h2>Dashboard 📊</h2>

<!-- CARDS -->
<div class="row">

<div class="col-md-3">
<div class="card-custom">👨‍🎓 Total Students<br><b id="totalStudents">0</b></div>
</div>

<div class="col-md-3">
<div class="card-custom">💰 Fees<br><b id="totalFees">₹0</b></div>
</div>

<div class="col-md-3">
<div class="card-custom">📉 Pending<br><b id="pendingFees">₹0</b></div>
</div>

<div class="col-md-3">
<div class="card-custom">📚 Courses<br><b id="totalCourses">0</b></div>
</div>

</div>

<!-- CHARTS -->
<div class="row mt-4">

<div class="col-md-6">
<canvas id="pieChart"></canvas>
</div>

<div class="col-md-6">
<canvas id="barChart"></canvas>
</div>

</div>

<!-- TABLE -->
<div class="card-custom mt-4">
<h5>Recent Students</h5>
<table class="table">
<tbody id="recentStudents"></tbody>
</table>
</div>

</div>

<!-- SCRIPTS -->
<script src="config.js"></script>
<script src="common.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
