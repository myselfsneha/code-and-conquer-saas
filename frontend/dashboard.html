<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">
<h2>🎓 Code & Conquer</h2>
<a href="dashboard.html" class="active">📊 Dashboard</a>
<a href="students.html">👨‍🎓 Students</a>

<label class="switch mt-3">
<input type="checkbox" onclick="toggleDark()">
<span class="slider"></span>
</label>
<p>Dark Mode</p>
</div>

<div class="main">

<h4 id="greeting" style="margin-bottom:10px;"></h4>
<h2>Dashboard 📊</h2>

<!-- CARDS -->
<div class="row">

<div class="col-md-3">
<div class="card-custom">👨‍🎓 Total Students<br><b>120</b></div>
</div>

<div class="col-md-3">
<div class="card-custom">💰 Fees<br><b>₹1,20,000</b></div>
</div>

<div class="col-md-3">
<div class="card-custom">📉 Pending<br><b>₹30,000</b></div>
</div>

<div class="col-md-3">
<div class="card-custom">📚 Courses<br><b>3</b></div>
</div>

</div>

<!-- CHARTS -->
<div class="row mt-4">

<div class="col-md-6">
<canvas id="pieChart"></canvas>
</div>

<div class="col-md-6">
<canvas id="barChart"></canvas>
</div>

</div>

<!-- TABLE -->
<div class="card-custom mt-4">
<h5>Recent Students</h5>
<table class="table">
<tr><td>Tirthi</td><td>BCA</td></tr>
<tr><td>Sneha</td><td>MCA</td></tr>
<tr><td>Oshi</td><td>BSA</td></tr>
<tr><td>Shivani</td><td>MCA</td></tr>
<tr><td>Khushi</td><td>BSA</td></tr>
</table>
</div>

</div>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}

new Chart(document.getElementById("pieChart"), {
type: "pie",
data: {
labels: ["Paid","Pending"],
datasets: [{data: [70,30]}]
}
});

new Chart(document.getElementById("barChart"), {
type: "bar",
data: {
labels: ["BCA","BBA","MCA"],
datasets: [{data: [50,40,30]}]
}
});
</script>
<script src="dashboard.js"></script>

</body>
</html>
