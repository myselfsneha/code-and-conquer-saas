<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
    <div></div>
</div>

<div class="sidebar">
<h2>🎓 Code & Conquer</h2>
<a href="dashboard.html" class="active">📊 Dashboard</a>
<a href="students.html">👨‍🎓 Students</a>
<a href="courses.html">📚 Courses</a>

<label class="switch mt-3">
<input type="checkbox" onclick="toggleDark()">
<span class="slider"></span>
</label>
<p>Dark Mode</p>

<br>
<button class="btn btn-danger w-100 mt-3" onclick="logout()">🚪 Logout</button>
</div>

<div class="main">

<h2>Dashboard 📊</h2>

<!-- ===== STATS CARDS ===== -->
<div class="row">

<div class="col-md-3">
<div class="card-custom text-center">
<h6>Total Students</h6>
<h3 id="totalStudents">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card-custom text-center">
<h6>Total Fees</h6>
<h3 id="totalFees">₹0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card-custom text-center">
<h6>Avg Attendance</h6>
<h3 id="avgAttendance">0%</h3>
</div>
</div>

<div class="col-md-3">
<div class="card-custom text-center">
<h6>Total Courses</h6>
<h3 id="totalCourses">0</h3>
</div>
</div>

</div>

<!-- ===== CHARTS ===== -->
<div class="row mt-4">

<div class="col-md-6">
<div class="card-custom">
<h5>Course Distribution</h5>
<canvas id="pieChart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card-custom">
<h5>Students per Year</h5>
<canvas id="barChart"></canvas>
</div>
</div>

</div>

<!-- ===== RECENT STUDENTS ===== -->
<div class="card-custom mt-4">
<h5>Recent Students</h5>

<table class="table text-center">
<thead>
<tr>
<th>Name</th>
<th>Course</th>
<th>Year</th>
<th>Fees</th>
<th>Attendance</th>
</tr>
</thead>

<tbody id="recentStudents"></tbody>
</table>

</div>

</div>

<!-- ===== SCRIPTS ===== -->
<script src="config.js"></script>
<script src="common.js"></script>
<script src="dashboard.js"></script>

<script>
function toggleDark(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
