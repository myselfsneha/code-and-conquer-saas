<!DOCTYPE html>
<html>
<head>
<title>Students</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">
<h2>🎓 Code & Conquer</h2>
<a href="dashboard.html">📊 Dashboard</a>
<a href="students.html" class="active">👨‍🎓 Students</a>

<!-- ✅ ADDED LOGOUT -->
<a href="login.html" onclick="localStorage.clear()">🚪 Logout</a>

<label class="switch mt-3">
<input type="checkbox" onclick="toggleDark()">
<span class="slider"></span>
</label>
<p>Dark Mode</p>
</div>

<div class="main">

<div class="card-custom">

<h3>Students 👨‍🎓</h3>

<!-- ✅ ADDED SEARCH + FILTER (no styling change, simple stack) -->
<input id="search" class="form-control mb-2" placeholder="Search by name">

<select id="filterCourse" class="form-control mb-2">
<option value="">All Courses</option>
<option>BCA</option>
<option>BBA</option>
<option>MCA</option>
</select>

<select id="filterYear" class="form-control mb-2">
<option value="">All Years</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>

<button class="btn btn-primary mb-3" onclick="fetchStudents(1)">Search</button>

<!-- EXISTING BUTTON (UNCHANGED) -->
<button class="btn btn-success mb-3" onclick="openModal()">+ Add Student</button>

<table class="table text-center">
<thead>
<tr>
<th>ID</th> <!-- ✅ ADDED -->
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Year</th>
<th>Fees Paid</th> <!-- ✅ ADDED -->
<th>Attendance %</th> <!-- ✅ ADDED -->
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody">
<tr>
<td>1</td>
<td>Tirthi</td>
<td>test@gmail.com</td>
<td>BCA</td>
<td>2</td>
<td>₹20000</td>
<td>85%</td>
<td>
<button class="btn btn-primary btn-sm">Edit</button>
<button class="btn btn-danger btn-sm">Delete</button>
</td>
</tr>
</tbody>
</table>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="studentModal">
<div class="modal-content">

<h5>Add Student</h5>

<input id="studentName" class="form-control mb-2" placeholder="Name">
<input id="studentEmail" class="form-control mb-2" placeholder="Email">

<!-- ✅ ADDED -->
<select id="studentCourse" class="form-select mb-2">
    <option value="">Select Course</option>
</select>

<select id="studentYear" class="form-control mb-2">
<option value="">Select Year</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>

<button class="btn btn-success w-100 mb-2" onclick="addStudent()">Add</button>
<button class="btn btn-secondary w-100" onclick="closeModal()">Cancel</button>

</div>
</div>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}

function openModal(){
document.getElementById("studentModal").style.display="flex";
}

function closeModal(){
document.getElementById("studentModal").style.display="none";
}
</script>

</body>
</html>
