<!DOCTYPE html>
<html>
<head>
<title>Courses</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🎓 Code & Conquer</h2>

<a href="dashboard.html">📊 Dashboard</a>
<a href="students.html">👨‍🎓 Students</a>
<a href="courses.html" class="active">📚 Courses</a>

<label class="switch mt-3">
<input type="checkbox" onclick="toggleDark()">
<span class="slider"></span>
</label>
<p>Dark Mode</p>

</div>

<!-- MAIN -->
<div class="main">

<div class="card-custom">

<h3>Courses 📚</h3>

<!-- ADD BUTTON -->
<button class="btn btn-success mb-3" onclick="openModal()">+ Add Course</button>

<!-- TABLE -->
<table class="table text-center">
<thead>
<tr>
<th>ID</th>
<th>Course Name</th>
<th>Duration</th>
<th>Action</th>
</tr>
</thead>

<tbody id="courseTable"></tbody>
</table>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="courseModal">
<div class="modal-content">

<h5>Add Course</h5>

<input id="courseName" class="form-control mb-2" placeholder="Course Name">
<input id="courseDuration" class="form-control mb-2" placeholder="Duration (e.g. 3 Years)">

<button class="btn btn-success w-100 mb-2" onclick="addCourse()">Add</button>
<button class="btn btn-secondary w-100" onclick="closeModal()">Cancel</button>

</div>
</div>

<script src="courses.js"></script>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
