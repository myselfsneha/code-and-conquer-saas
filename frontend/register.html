<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
background: linear-gradient(135deg,#3b82f6,#6366f1);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card {
width:420px;
padding:25px;
border-radius:15px;
}

.error {
color:red;
font-size:14px;
}
</style>
</head>

<body>

<div class="card shadow">

<h3>Create Admin Account 🚀</h3>

<input id="name" class="form-control mb-2" placeholder="Full Name">
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="tenant" class="form-control mb-2" placeholder="Tenant ID (e.g. 1001)">

<input id="password" type="password" class="form-control mb-2" placeholder="Password">
<input id="confirmPassword" type="password" class="form-control mb-2" placeholder="Confirm Password">

<div id="errorMsg" class="error mb-2"></div>

<button class="btn btn-primary w-100" onclick="validateAndRegister()">Register</button>

<p class="mt-3 mb-0 text-center"><a href="login.html">Back to Login</a></p>

</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
async function validateAndRegister() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const tenant = document.getElementById("tenant").value.trim();
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirmPassword").value;

  if (!name || !email || !password || !confirm || !tenant) {
    document.getElementById("errorMsg").innerText = "All fields required ❌";
    return;
  }

  if (password !== confirm) {
    document.getElementById("errorMsg").innerText = "Passwords do not match!";
    return;
  }

  try {
    const res = await fetch(`${API}/register-admin`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name,
        email,
        password,
        tenant_id: Number(tenant),
        role: "admin"
      })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      document.getElementById("errorMsg").innerText = data.message || "Registration failed ❌";
      return;
    }

    showToast("Registered Successfully ✅");
    setTimeout(() => {
      window.location.href = "login.html";
    }, 700);

  } catch (err) {
    console.error(err);
    document.getElementById("errorMsg").innerText = "Server error ❌";
  }
}
</script>

</body>
</html>
