<!DOCTYPE html>
<html>
<head>
<title>Register | EduNexus</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* BACKGROUND */
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(270deg, #43e97b, #38f9d7, #4facfe);
    background-size: 600% 600%;
    animation: gradientMove 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* CARD */
.register-glass {
    width: 400px;
    padding: 40px;
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    text-align: center;
    color: white;
}

/* INPUT */
.input-group {
    margin: 15px 0;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
}

/* BUTTON */
.register-glass button {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    background: #00f2fe;
    color: black;
    font-weight: bold;
}

</style>

</head>

<body>

<div class="register-glass">

    <h2>🏫 Register College</h2>

    <!-- NAME -->
    <div class="input-group">
        <input type="text" id="name" placeholder="College Name">
    </div>

    <!-- EMAIL -->
    <div class="input-group">
        <input type="email" id="email" placeholder="Email">
    </div>

    <!-- PASSWORD -->
    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <!-- TENANT ID -->
    <div class="input-group">
        <input type="text" id="tenant_id" placeholder="College ID (any unique name)">
    </div>

    <button onclick="registerUser()">Register</button>

    <a href="login.html" style="color:white; display:block; margin-top:10px;">
        Already have an account? Login
    </a>

</div>

<div id="toast" class="toast-box"></div>

<div class="loader" id="loader">
    <div></div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="register.js"></script>

</body>
</html>
