<!DOCTYPE html>
<html>
<head>
<title>Register | Code & Conquer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* ===== BACKGROUND ===== */
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(270deg, #43e97b, #38f9d7, #4facfe);
    background-size: 600% 600%;
    animation: gradientMove 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* ===== GLASS CARD ===== */
.register-glass {
    width: 400px;
    padding: 40px;
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    text-align: center;
    color: white;
    animation: fadeUp 1s ease;
}

@keyframes fadeUp {
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ===== INPUT ===== */
.input-group {
    position: relative;
    margin: 15px 0;
}

.input-group input,
.input-group select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
}

.input-group label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    color: #555;
    transition: 0.3s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -8px;
    left: 10px;
    font-size: 12px;
    color: #00f2fe;
}

/* ===== BUTTON ===== */
.register-glass button {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    background: #00f2fe;
    color: black;
    font-weight: bold;
    margin-top: 10px;
    transition: 0.3s;
}

.register-glass button:hover {
    transform: scale(1.05);
}

/* ===== TOAST ===== */
.toast-box {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    display: none;
}

</style>

</head>

<body>

<div class="register-glass">

    <h2>✨ Create Account</h2>

    <!-- ROLE -->
    <div class="input-group">
        <select id="role">
            <option value="">Select Role</option>
            <option value="admin">Admin</option>
            <option value="tenant">Tenant</option>
            <option value="student">Student</option>
        </select>
    </div>

    <!-- NAME -->
    <div class="input-group">
        <input type="text" id="name" placeholder=" " />
        <label>Name</label>
    </div>

    <!-- EMAIL -->
    <div class="input-group">
        <input type="email" id="email" placeholder=" " />
        <label>Email</label>
    </div>

    <!-- PASSWORD -->
    <div class="input-group">
        <input type="password" id="password" placeholder=" " />
        <label>Password</label>
    </div>

    <button onclick="registerUser()">Register</button>

    <a href="login.html" style="color:white; display:block; margin-top:10px;">
        Already have an account? Login
    </a>

</div>

<div id="toast" class="toast-box"></div>

<div class="loader" id="loader">
    <div></div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="register.js"></script>

</body>
</html>
