<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
background: linear-gradient(135deg,#3b82f6,#6366f1);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card {
width:420px;
padding:25px;
border-radius:15px;
}
</style>
</head>

<body>
<div class="card shadow">
<h3>Create Admin Account 🚀</h3>

<input id="name" class="form-control mb-2" placeholder="Full Name">
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="tenant" class="form-control mb-2" placeholder="Tenant ID (e.g. 1001)">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">
<input id="confirmPassword" type="password" class="form-control mb-2" placeholder="Confirm Password">

<button class="btn btn-primary w-100" onclick="validateAndRegister()">Register</button>
<p class="mt-3 text-center"><a href="login.html">Back to Login</a></p>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="register.js"></script>
<script>
function validateAndRegister() {
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirmPassword").value;

  if (password !== confirm) {
    showToast("Passwords do not match", "error");
    return;
  }

  registerUser();
}
</script>
</body>
</html>
