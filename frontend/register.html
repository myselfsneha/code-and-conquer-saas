<style>

/* ===== BACKGROUND ===== */
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(270deg, #43e97b, #38f9d7, #4facfe);
    background-size: 600% 600%;
    animation: gradientMove 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* ===== GLASS CARD ===== */
.register-glass {
    width: 400px;
    padding: 40px;
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    text-align: center;
    color: white;
    animation: fadeUp 1s ease;
}

@keyframes fadeUp {
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ===== INPUT ===== */
.input-group {
    position: relative;
    margin: 15px 0;
}

.input-group input,
.input-group select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
}

.input-group label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    color: #555;
    transition: 0.3s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -8px;
    left: 10px;
    font-size: 12px;
    color: #00f2fe;
}

/* ===== BUTTON ===== */
.register-glass button {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    background: #00f2fe;
    color: black;
    font-weight: bold;
    margin-top: 10px;
    transition: 0.3s;
}

.register-glass button:hover {
    transform: scale(1.05);
}

/* ===== TOAST ===== */
.toast-box {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    display: none;
}

</style>

</head>

<script>
async function validateAndRegister() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const tenant = document.getElementById("tenant").value.trim();
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirmPassword").value;

  if (!name || !email || !password || !confirm || !tenant) {
    document.getElementById("errorMsg").innerText = "All fields required ❌";
    return;
  }

  if (password !== confirm) {
    document.getElementById("errorMsg").innerText = "Passwords do not match!";
    return;
  }

  try {
    const res = await fetch(`${API}/register-admin`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name,
        email,
        password,
        tenant_id: Number(tenant),
        role: "admin"
      })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      document.getElementById("errorMsg").innerText = data.message || "Registration failed ❌";
      return;
    }

    showToast("Registered Successfully ✅");
    setTimeout(() => {
      window.location.href = "login.html";
    }, 700);

  } catch (err) {
    console.error(err);
    document.getElementById("errorMsg").innerText = "Server error ❌";
  }
}
</script>
