<!DOCTYPE html>
<html>
<head>
<title>Code & Conquer SaaS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* BACKGROUND ANIMATION */
body {
    background: linear-gradient(270deg, #4facfe, #00f2fe, #a18cd1);
    background-size: 600% 600%;
    animation: gradientMove 10s ease infinite;
    color: white;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

.hero h1 {
    font-size: 60px;
    font-weight: bold;
}

.hero p {
    font-size: 20px;
    opacity: 0.9;
}

/* BUTTON */
.hero .btn {
    margin: 10px;
    padding: 12px 30px;
    font-size: 18px;
    border-radius: 30px;
    transition: 0.3s;
}

.hero .btn:hover {
    transform: scale(1.05);
}

/* FEATURES */
.feature-card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    transition: 0.3s;
}

.feature-card:hover {
    transform: translateY(-10px);
}

</style>

</head>

<body>

<div class="hero">
    <h1>🎓 Code & Conquer</h1>
    <p>Smart SaaS Platform for Student Management 🚀</p>

    <div>
        <a href="login.html" class="btn btn-light">Login</a>
        <a href="register.html" class="btn btn-dark">Register</a>
    </div>
</div>

<div class="container text-center mt-5">

<h3>✨ Features</h3>

<div class="row mt-4">

<div class="col-md-3">
<div class="feature-card">👨‍🎓 Students</div>
</div>

<div class="col-md-3">
<div class="feature-card">💰 Fees</div>
</div>

<div class="col-md-3">
<div class="feature-card">📊 Analytics</div>
</div>

<div class="col-md-3">
<div class="feature-card">🏫 Tenants</div>
</div>

</div>

</div>

<script src="config.js"></script>

<script>
// AUTO REDIRECT
let token = localStorage.getItem("token");
let loginTime = localStorage.getItem("loginTime");

if(token && loginTime){
    let now = new Date().getTime();

    if(now - loginTime < TOKEN_EXPIRY){
        window.location.href = "dashboard.html";
    }
}
</script>

</body>
</html>
