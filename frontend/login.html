<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  height:100vh;
  display:flex;
}

.left {
  flex:1;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction: column;
}

.right {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>

</head>

<body>

<div class="left">
  <h1>🚀 Code & Conquer</h1>
  <h4>Multi-tenant Student Management System</h4>
</div>

<div class="right">
  <div class="card p-4 shadow" style="width:300px">

    <h3>Login</h3>

    <select id="role" class="form-select mb-2">
      <option value="">Login As</option>
      <option value="student">Student</option>
      <option value="college">College</option>
    </select>

    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-2" placeholder="Password">

    <button onclick="loginUser()" class="btn btn-primary w-100">Login</button>

    <p class="mt-2 text-center">
      <a href="register.html">Register</a>
    </p>

  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="login.js"></script>

</body>
</html>
