<!DOCTYPE html>
<html>
<head>
<title>Login | EduNexus </title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* ===== BACKGROUND ===== */
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(270deg, #4facfe, #00f2fe, #a18cd1);
    background-size: 600% 600%;
    animation: gradientMove 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* ===== PARTICLES ===== */
.particles span {
    position: absolute;
    display: block;
    width: 8px;
    height: 8px;
    background: white;
    opacity: 0.2;
    border-radius: 50%;
    animation: float 10s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh) scale(0); }
    100% { transform: translateY(-10vh) scale(1); }
}

/* ===== GLASS CARD ===== */
.login-glass {
    width: 380px;
    padding: 40px;
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    text-align: center;
    color: white;
    animation: fadeUp 1s ease;
}

@keyframes fadeUp {
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ===== INPUT GROUP ===== */
.input-group {
    position: relative;
    margin: 20px 0;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
}

.input-group label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    color: #555;
    transition: 0.3s;
    pointer-events: none;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -8px;
    left: 10px;
    font-size: 12px;
    color: #00f2fe;
}

/* ===== PASSWORD TOGGLE ===== */
.eye {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}

/* ===== BUTTON ===== */
.login-glass button {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    background: #00f2fe;
    color: black;
    font-weight: bold;
    overflow: hidden;
    position: relative;
}

/* Ripple */
.login-glass button:active::after {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    top: -100px;
    left: -100px;
    animation: ripple 0.6s linear;
}

@keyframes ripple {
    from { transform: scale(0); opacity: 1; }
    to { transform: scale(1); opacity: 0; }
}

/* ===== LINKS ===== */
.login-glass a {
    display: block;
    margin-top: 10px;
    color: white;
    opacity: 0.8;
}

/* ===== TOAST ===== */
.toast-box {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    display: none;
}

</style>

</head>

<body>

<!-- PARTICLES -->
<div class="particles">
    <span style="left:10%; animation-delay:0s;"></span>
    <span style="left:30%; animation-delay:2s;"></span>
    <span style="left:50%; animation-delay:4s;"></span>
    <span style="left:70%; animation-delay:1s;"></span>
    <span style="left:90%; animation-delay:3s;"></span>
</div>

<!-- LOGIN CARD -->
<div class="login-glass">

    <h2>🚀 Welcome Back</h2>

    <!-- ROLE SELECT -->
    <div class="input-group">
    <select id="role">
  <option value="">Select Role</option>
  <option value="college">College</option>
  <option value="admin">Admin</option>
  <option value="student">Student</option>
</select>
</div>

    <div class="input-group">
        <input type="email" id="email" placeholder=" " />
        <label>Email</label>
    </div>

    <div class="input-group">
        <input type="password" id="password" placeholder=" " />
        <label>Password</label>
        <span class="eye" onclick="togglePassword()">👁</span>
    </div>

    <button onclick="loginUser()">Login</button>

    <a href="register.html">Don't have an account? Register</a>

</div>

<div id="toast" class="toast-box"></div>

<div class="loader" id="loader">
    <div></div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="login.js"></script>

<script>
function togglePassword(){
    let p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
