<!DOCTYPE html>
<html>
<head>
<title>Students</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="loader" id="loader">
    <div></div>
</div>

<div class="sidebar">
<h2>🎓 Code & Conquer</h2>
<a href="dashboard.html">📊 Dashboard</a>
<a href="students.html" class="active">👨‍🎓 Students</a>
<a href="courses.html">📚 Courses</a>

<label class="switch mt-3">
<input type="checkbox" onclick="toggleDark()">
<span class="slider"></span>
</label>
<p>Dark Mode</p>

<br>
<button class="btn btn-danger w-100 mt-3" onclick="logout()">🚪 Logout</button>
</div>

<div class="main">

<div class="card-custom">

<h3>Student 👨‍🎓</h3>

<!-- 🔍 SEARCH + FILTER -->
<input type="text" id="search" class="form-control mb-2" placeholder="Search by name">

<select id="filterCourse" class="form-control mb-2">
    <option value="">All Courses</option>
</select>

<select id="filterYear" class="form-control mb-2">
<option value="">All Years</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>

<button class="btn btn-primary mb-3" onclick="renderStudents()">Search</button>

<!-- ➕ ADD -->
<button class="btn btn-success mb-3" onclick="openModal()">+ Add Student</button>

<!-- 📊 TABLE -->
<table class="table text-center">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Year</th>
<th>Fees Paid</th>
<th>Attendance %</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="studentModal">
<div class="modal-content">

<h5>Add Student</h5>

<input id="name" class="form-control mb-2" placeholder="Name">
<input id="email" class="form-control mb-2" placeholder="Email">

<select id="course" class="form-control mb-2">
<option value="">Select Course</option>
</select>

<select id="year" class="form-control mb-2">
<option value="">Select Year</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>

<input id="fees" class="form-control mb-2" placeholder="Fees Paid">
<input id="attendance" class="form-control mb-2" placeholder="Attendance %">

<button class="btn btn-success w-100 mb-2" onclick="addStudent()">Add</button>
<button class="btn btn-secondary w-100" onclick="closeModal()">Cancel</button>

</div>
</div>

<script src="student.js"></script>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}

function openModal(){
document.getElementById("studentModal").style.display="flex";
}

function closeModal(){
document.getElementById("studentModal").style.display="none";
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}
</script>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="common.js"></script>
</body>
</html>
