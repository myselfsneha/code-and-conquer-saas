<!DOCTYPE html>
<html>
<head>
<title>Tenants</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="loader" id="loader">
    <div></div>
</div>

<div class="sidebar">
<h2>🎓 EduNexus </h2>
<a href="dashboard.html">📊 Dashboard</a>
<a href="students.html">👨‍🎓 Students</a>
<a href="courses.html">📚 Courses</a>
<a href="tenants.html" class="active">🏫 Tenants</a>

<label class="switch mt-3">
<input type="checkbox" onclick="toggleDark()">
<span class="slider"></span>
</label>
<p>Dark Mode</p>

<br>
<button class="btn btn-danger w-100 mt-3" onclick="logout()">🚪 Logout</button>
</div>

<div class="main">

<div class="card-custom">

<h3>Tenants (Colleges) 🏫</h3>

<!-- SEARCH -->
<input type="text" id="searchTenant" class="form-control mb-3" placeholder="Search tenant">

<!-- ADD -->
<button class="btn btn-success mb-3" onclick="openModal()">+ Add Tenant</button>

<!-- TABLE -->
<table class="table text-center">
<thead>
<tr>
<th>ID</th>
<th>College Name</th>
<th>Email</th>
<th>Students</th>
<th>Courses</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tenantTable"></tbody>
</table>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="tenantModal">
<div class="modal-content">

<h5>Add Tenant</h5>

<input id="tenantName" class="form-control mb-2" placeholder="College Name">
<input id="tenantEmail" class="form-control mb-2" placeholder="Email">

<select id="tenantStatus" class="form-control mb-2">
<option value="Active">Active</option>
<option value="Inactive">Inactive</option>
</select>

<button class="btn btn-success w-100 mb-2" onclick="addTenant()">Add</button>
<button class="btn btn-secondary w-100" onclick="closeModal()">Cancel</button>

</div>
</div>

<script src="tenants.js"></script>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}

function openModal(){
document.getElementById("tenantModal").style.display="flex";
}

function closeModal(){
document.getElementById("tenantModal").style.display="none";
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}
</script>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="tenants.js"></script>
</body>
</html>
