<!DOCTYPE html>
<html>
<head>
<title>Tenants</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="loader" id="loader">
<div></div>
</div>

<div class="sidebar">
<h2>🎓 Code & Conquer</h2>
<a href="dashboard.html">📊 Dashboard</a>
<a href="students.html">👨‍🎓 Students</a>
<a href="courses.html">📚 Courses</a>
<a href="tenants.html" class="active">🏫 Tenants</a>

<label class="switch mt-3">
<input type="checkbox" onclick="toggleDark()">
<span class="slider"></span>
</label>
<p>Dark Mode</p>

<br>
<button class="btn btn-danger w-100 mt-3" onclick="logout()">🚪 Logout</button>
</div>

<div class="main">

<div class="card-custom">

<h3>Tenants (Colleges) 🏫</h3>

<input type="text" id="searchTenant" class="form-control mb-3" placeholder="Search tenant">

<button class="btn btn-success mb-3" onclick="openModal()">+ Add Tenant</button>

<table class="table text-center">
<thead>
<tr>
<th>ID</th>
<th>College Name</th>
<th>Email</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tenantTable"></tbody>
</table>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="tenantModal">
<div class="modal-content">

<h5>Add Tenant</h5>

<input id="tenantName" class="form-control mb-2" placeholder="College Name">
<input id="tenantEmail" class="form-control mb-2" placeholder="Email">

<select id="tenantStatus" class="form-control mb-2">
<option value="Active">Active</option>
<option value="Inactive">Inactive</option>
</select>

<button class="btn btn-success w-100 mb-2" onclick="addTenant()">Add</button>
<button class="btn btn-secondary w-100" onclick="closeModal()">Cancel</button>

</div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>

<script>

// ===== LOCAL STORAGE TENANTS =====
let tenants = JSON.parse(localStorage.getItem("tenants")) || [];

// ===== RENDER =====
function renderTenants(){
    const table = document.getElementById("tenantTable");
    const search = document.getElementById("searchTenant").value.toLowerCase();

    table.innerHTML = "";

    const filtered = tenants.filter(t =>
        t.name.toLowerCase().includes(search)
    );

    if(filtered.length === 0){
        table.innerHTML = `<tr><td colspan="5">No tenants found 😕</td></tr>`;
        return;
    }

    filtered.forEach((t, i)=>{
        table.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${t.name}</td>
            <td>${t.email}</td>
            <td>${t.status}</td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="deleteTenant(${i})">Delete</button>
            </td>
        </tr>`;
    });
}

// ===== ADD =====
function addTenant(){
    const name = document.getElementById("tenantName").value;
    const email = document.getElementById("tenantEmail").value;
    const status = document.getElementById("tenantStatus").value;

    if(!name || !email){
        showToast("Fill all fields ❌","error");
        return;
    }

    tenants.push({ name, email, status });

    localStorage.setItem("tenants", JSON.stringify(tenants));

    showToast("Tenant added ✅");

    closeModal();
    renderTenants();
}

// ===== DELETE =====
function deleteTenant(index){
    tenants.splice(index,1);
    localStorage.setItem("tenants", JSON.stringify(tenants));
    renderTenants();
}

// ===== SEARCH =====
document.getElementById("searchTenant").addEventListener("input", renderTenants);

// ===== UI =====
function toggleDark(){
document.body.classList.toggle("dark");
}

function openModal(){
document.getElementById("tenantModal").style.display="flex";
}

function closeModal(){
document.getElementById("tenantModal").style.display="none";
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

// INIT
renderTenants();

</script>

</body>
</html>
